name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SERVERPOD_PASSWORD_database: ${{ secrets.SERVERPOD_PASSWORD_DATABASE }}
      SERVERPOD_PASSWORD_redis: ${{ secrets.SERVERPOD_PASSWORD_REDIS }}

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Start containers
        working-directory: gsdui_server
        run: docker compose up --build -d

      - name: Install dependencies
        working-directory: gsdui_server
        run: flutter pub get

      - name: Install Serverpod CLI
        run: dart pub global activate serverpod_cli

      - name: Run Serverpod generator
        working-directory: gsdui_server
        run: serverpod generate

      - name: Run tests
        working-directory: gsdui_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: gsdui_server
        run: docker compose down -v
